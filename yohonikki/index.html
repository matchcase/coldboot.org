<!DOCTYPE html>
<html lang="ja">
<head>
  <title>yohonikki</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <style>
    /* Password screen only — game CSS is encrypted */
    :root { --font: 'DotGothic16', 'MS Gothic', monospace; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; font-family: var(--font); }
    #pw-screen {
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0a14;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      image-rendering: pixelated;
    }
    #pw-screen .title { color: #555566; font-size: 12px; letter-spacing: 0.3em; margin-bottom: 32px; }
    #pw-screen label { color: #8888aa; font-size: 14px; letter-spacing: 0.15em; margin-bottom: 12px; }
    #pw-screen input {
      background: #0c0c1a; border: 1px solid #3a3050; color: #ccccdd;
      font-family: var(--font); font-size: 16px; padding: 10px 20px;
      text-align: center; outline: none; width: 200px;
    }
    #pw-screen input:focus { border-color: #5a4870; }
    #pw-screen button {
      margin-top: 16px; background: #0c0c1a; border: 1px solid #3a3050;
      color: #e8c86a; font-family: var(--font); font-size: 14px;
      padding: 8px 48px; cursor: pointer; letter-spacing: 0.2em;
      white-space: nowrap; min-width: 200px; text-align: center;
    }
    #pw-screen button:hover { background: #14122a; border-color: #5a4870; color: #ffeaa0; }
    #pw-screen .error { color: #aa4444; font-size: 12px; margin-top: 12px; min-height: 1.5em; }
  </style>
</head>
<body>
  <div id="pw-screen">
    <div class="title">yohonikki</div>
    <label>パスワード を いれてね</label>
    <input type="text" id="pw-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
    <button id="pw-btn">はいる</button>
    <div class="error" id="pw-error"></div>
  </div>

  <!-- Game DOM (hidden until decryption succeeds) -->
  <div id="menu-screen" style="display:none">
    <div class="menu-items-row">
      <img src="./assets/images/item_tamagotchi.png" alt="" class="menu-item-icon">
      <img src="./assets/images/item_sun.png" alt="" class="menu-item-icon">
      <img src="./assets/images/item_acrylic.png" alt="" class="menu-item-icon">
      <img src="./assets/images/item_coffee.png" alt="" class="menu-item-icon">
    </div>
    <div class="menu-title">yohonikki</div>
    <div class="menu-subtitle">よほにっき</div>
    <button id="start-btn">はじめる</button>
  </div>

  <div id="game">
    <div id="bg">

      <div id="vignette"></div>
      <div id="scanlines"></div>
      <div id="item-wrap"></div>
    </div>
    <div id="textbox">
      <div id="text"></div>
    </div>
    <div id="choices"></div>
  </div>

    function decrypt(password) {
      var raw = Uint8Array.from(atob(ENCRYPTED), function(c) { return c.charCodeAt(0); });
      var salt = raw.slice(0, 16);
      var iv = raw.slice(16, 28);
      var tag = raw.slice(28, 44);
      var data = raw.slice(44);
      var combined = new Uint8Array(data.length + 16);
      combined.set(data);
      combined.set(tag, data.length);
      return crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
      ).then(function(keyMaterial) {
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );
      }).then(function(key) {
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, combined);
      }).then(function(decrypted) {
        return JSON.parse(new TextDecoder().decode(decrypted));
      });
    }

    function unlock(pw) {
      if (!pw) return;
      var errEl = document.getElementById('pw-error');
      var btn = document.getElementById('pw-btn');
      var input = document.getElementById('pw-input');
      if (errEl) errEl.textContent = '';

      // Show loading state
      if (btn) btn.textContent = 'よみこみちゅう...';
      if (btn) btn.style.pointerEvents = 'none';
      if (input) input.style.display = 'none';

      // Yield to let browser repaint before heavy PBKDF2
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          decrypt(pw).then(function(result) {
            // Save password for session persistence
            try { sessionStorage.setItem('yohonikki_pw', pw); } catch(e) {}
            // Remove password screen, show menu
            var pwScreen = document.getElementById('pw-screen');
            if (pwScreen) pwScreen.remove();
            document.getElementById('menu-screen').style.display = '';
            // Inject CSS
            var style = document.createElement('style');
            style.textContent = result.css;
            document.head.appendChild(style);
            // Execute decrypted JS
            var s = document.createElement('script');
            s.textContent = result.js;
            document.body.appendChild(s);
          }).catch(function() {
            if (errEl) errEl.textContent = 'ちがう';
            if (btn) { btn.textContent = 'はいる'; btn.style.pointerEvents = ''; }
            if (input) { input.style.display = ''; input.value = ''; input.focus(); }
          });
        });
      });
    }

    // Try auto-unlock from session
    var saved = null;
    try { saved = sessionStorage.getItem('yohonikki_pw'); } catch(e) {}
    if (saved) {
      unlock(saved);
    } else {
      document.getElementById('pw-btn').addEventListener('click', function() {
        unlock(document.getElementById('pw-input').value);
      });
      document.getElementById('pw-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') unlock(document.getElementById('pw-input').value);
      });
    }
  })();
  </script>
</body>
</html>
