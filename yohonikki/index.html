<html lang="ja">
<head>
  <title>yohonikki</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./engine/core/monogatari.css">
  <script src="./engine/core/monogatari.js"></script>
  <script>const monogatari = Monogatari.default;</script>
  <style>
    #pw-screen {
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0a14;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'DotGothic16', monospace;
      image-rendering: pixelated;
    }
    #pw-screen .title {
      color: #555566;
      font-size: 12px;
      letter-spacing: 0.3em;
      margin-bottom: 32px;
    }
    #pw-screen label {
      color: #8888aa;
      font-size: 14px;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    #pw-screen input {
      background: #0c0c1a;
      border: 1px solid #3a3050;
      color: #ccccdd;
      font-family: 'DotGothic16', monospace;
      font-size: 16px;
      padding: 10px 20px;
      text-align: center;
      outline: none;
      width: 200px;
    }
    #pw-screen input:focus {
      border-color: #5a4870;
    }
    #pw-screen button {
      margin-top: 16px;
      background: #0c0c1a;
      border: 1px solid #3a3050;
      color: #e8c86a;
      font-family: 'DotGothic16', monospace;
      font-size: 14px;
      padding: 8px 40px;
      cursor: pointer;
      letter-spacing: 0.2em;
    }
    #pw-screen button:hover {
      background: #14122a;
      border-color: #5a4870;
      color: #ffeaa0;
    }
    #pw-screen .error {
      color: #aa4444;
      font-size: 12px;
      margin-top: 12px;
      min-height: 1.5em;
    }
  </style>
</head>
<body>
  <div id="pw-screen">
    <div class="title">yohonikki</div>
    <label>パスワード を いれてね</label>
    <input type="password" id="pw-input" autofocus>
    <button id="pw-btn">はいる</button>
    <div class="error" id="pw-error"></div>
  </div>

  <div id="monogatari" style="display:none">
    <visual-novel>
      <loading-screen></loading-screen>
      <main-screen>
        <main-menu></main-menu>
      </main-screen>
      <game-screen>
        <dialog-log></dialog-log>
        <text-box></text-box>
        <quick-menu></quick-menu>
      </game-screen>
      <load-screen></load-screen>
      <save-screen></save-screen>
      <settings-screen></settings-screen>
    </visual-novel>
  </div>

    async function decrypt(password) {
      const raw = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
      const salt = raw.slice(0, 16);
      const iv = raw.slice(16, 28);
      const tag = raw.slice(28, 44);
      const data = raw.slice(44);
      const combined = new Uint8Array(data.length + 16);
      combined.set(data);
      combined.set(tag, data.length);
      const keyMaterial = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv },
        key,
        combined
      );
      return JSON.parse(new TextDecoder().decode(decrypted));
    }

    async function unlock() {
      const pw = document.getElementById('pw-input').value;
      const errEl = document.getElementById('pw-error');
      if (!pw) return;
      errEl.textContent = '';
      try {
        const { js, css } = await decrypt(pw);
        // Inject CSS
        const style = document.createElement('style');
        style.textContent = css;
        document.head.appendChild(style);
        // Inject and execute JS
        const script = document.createElement('script');
        script.textContent = js;
        document.head.appendChild(script);
        // Show game, hide password screen
        document.getElementById('pw-screen').remove();
        document.getElementById('monogatari').style.display = '';
        // Initialize Monogatari
        const { $_ready } = Monogatari;
        $_ready(() => {
          monogatari.init('#monogatari').then(() => {
            console.log('[yohonikki] Game initialized');
          });
        });
      } catch (e) {
        errEl.textContent = 'ちがう';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }

    document.getElementById('pw-btn').addEventListener('click', unlock);
    document.getElementById('pw-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') unlock();
    });
  })();
